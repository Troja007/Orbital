title: "Inventory operating systems on Orbital endpoints"
status: "tested"
created: "2026-06-10"
updated: "2026-06-10"

investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Query all Windows hosts and tell me the operating system where Orbital is installed."
    - "Query all Linux hosts and tell me the operating system where Orbital is installed."
  keywords:
    - "operating system"
    - "os_version"
    - "system_info"
    - "orbital installed"
    - "endpoint inventory"
  threat_context:
    category: "orbital_health"
    platforms:
      - "cross_platform"

query_goal:
  question: "List operating system details for endpoints that respond to Orbital live queries."
  expected_information:
    - "computer name"
    - "operating system"
    - "version"
    - "platform"
    - "architecture"
  not_for:
    - "Confirming historical endpoint enrollment."
    - "Listing offline endpoints that do not respond to live queries."

