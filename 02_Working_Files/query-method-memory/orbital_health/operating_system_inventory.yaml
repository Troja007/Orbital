osquery_context:
  tables:
    - name: "os_version"
      columns:
        - "name"
        - "version"
        - "platform"
        - "platform_like"
        - "arch"
      platform_notes:
        - "Single-row table containing operating system name and version."
    - name: "system_info"
      columns:
        - "hostname"
      platform_notes:
        - "Used to include computer name for cross-endpoint inventory display."
  joins:
    - "CROSS JOIN system_info to include hostname with os_version."
  constraints:
    - "Use an Orbital OS selector such as os:windows, os:linux, or all with OS targeting."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os:
    - "windows"
    - "linux"
    - "darwin"
  target_selector_guidance:
    - "For broad inventory, use all with an OS target/filter only after the user confirms scope."
    - "If all plus OS targeting returns no metadata, retry with the documented os:<platform> node selector to distinguish empty target sets from selector-shape issues."
  broad_targeting_risk:
    level: "low"
    notes:
      - "os_version and system_info are inventory tables with low expected endpoint impact."

sql_patterns:
  - name: "Operating system inventory"
    description: "List OS details for Orbital endpoints in the selected OS target scope."
    sql: |
      SELECT
        si.hostname AS computer_name,
        ov.name AS operating_system,
        ov.version,
        ov.platform,
        ov.platform_like,
        ov.arch
      FROM os_version ov
      CROSS JOIN system_info si
      ORDER BY computer_name ASC;

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: true
  notes:
    - "Windows live query returned endpoint rows on 2026-06-10."
    - "Linux live query returned zero rows and no endpoint metadata on 2026-06-10."

lessons:
  - date: "2026-06-10"
    note: "Store catalog table context after execution, including categories and MITRE mappings shown by the Orbital Catalog."
  - date: "2026-06-10"
    note: "Use os_version for OS details and system_info.hostname for computer-name ordering."

privacy:
  stores_endpoint_results: false
  sanitized_placeholders:
    - "<hostname>"
    - "<platform>"
  forbidden_values:
    - "hostnames"
    - "usernames"
    - "ip_addresses"
    - "orbital_ids"
    - "secure_endpoint_guids"
    - "secure_client_guids"
    - "anyconnect_udids"
    - "customer_names"
    - "bearer_tokens"
    - "raw_api_responses"
