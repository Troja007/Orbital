sql_patterns:
  - name: "Specific loaded driver by path"
    description: "Check whether a driver file path is currently loaded, while also showing installed service and file evidence."
    parameters:
      driver_filename: "<driver_filename>"
      driver_path: "<driver_path>"
    sql: |
      WITH loaded_driver AS (
        SELECT
          service,
          device_name,
          image,
          description,
          provider,
          manufacturer,
          signed,
          service_key
        FROM drivers
        WHERE lower(image) LIKE '%' || lower('<driver_filename>') || '%'
           OR lower(device_name) LIKE '%' || lower('<driver_filename_without_extension>') || '%'
           OR lower(service) LIKE '%' || lower('<driver_filename_without_extension>') || '%'
      ),
      driver_service AS (
        SELECT
          name,
          display_name,
          service_type,
          status,
          pid,
          start_type,
          path,
          module_path,
          win32_exit_code,
          service_exit_code
        FROM services
        WHERE lower(path) LIKE '%' || lower('<driver_filename>') || '%'
           OR lower(name) LIKE '%' || lower('<driver_filename_without_extension>') || '%'
           OR lower(display_name) LIKE '%' || lower('<driver_filename_without_extension>') || '%'
      ),
      service_registry AS (
        SELECT
          key,
          path,
          name,
          type,
          data,
          datetime(mtime, 'unixepoch', 'UTC') AS modified_utc
        FROM registry
        WHERE key LIKE 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\%'
          AND name = 'ImagePath'
          AND lower(data) LIKE '%' || lower('<driver_filename>') || '%'
      ),
      driver_file AS (
        SELECT
          path,
          size,
          type,
          datetime(btime, 'unixepoch', 'UTC') AS created_utc,
          datetime(mtime, 'unixepoch', 'UTC') AS modified_utc
        FROM file
        WHERE path = '<driver_path>'
      )
      SELECT
        si.hostname AS host,
        CASE
          WHEN EXISTS (SELECT 1 FROM loaded_driver)
            OR EXISTS (
              SELECT 1
              FROM driver_service
              WHERE lower(service_type) LIKE '%driver%'
                AND lower(status) = 'running'
            )
          THEN 'true'
          ELSE 'false'
        END AS driver_loaded,
        CASE WHEN EXISTS (SELECT 1 FROM loaded_driver) THEN 'true' ELSE 'false' END AS drivers_table_found,
        CASE
          WHEN EXISTS (
            SELECT 1
            FROM driver_service
            WHERE lower(service_type) LIKE '%driver%'
              AND lower(status) = 'running'
          ) THEN 'true'
          ELSE 'false'
        END AS running_driver_service_found,
        CASE WHEN EXISTS (SELECT 1 FROM driver_service) THEN 'true' ELSE 'false' END AS service_entry_found,
        CASE WHEN EXISTS (SELECT 1 FROM service_registry) THEN 'true' ELSE 'false' END AS service_registry_imagepath_found,
        CASE WHEN EXISTS (SELECT 1 FROM driver_file) THEN 'true' ELSE 'false' END AS driver_file_found,
        COALESCE((SELECT group_concat(service || ' image=' || image || ' signed=' || CAST(signed AS TEXT), '; ') FROM loaded_driver), '') AS drivers_evidence,
        COALESCE((SELECT group_concat(name || ' type=' || service_type || ' status=' || status || ' start=' || start_type || ' path=' || path, '; ') FROM driver_service), '') AS service_evidence,
        COALESCE((SELECT group_concat(key || ' ' || name || '=' || data, '; ') FROM service_registry), '') AS registry_evidence,
        COALESCE((SELECT group_concat(path || ' size=' || CAST(size AS TEXT) || ' type=' || type, '; ') FROM driver_file), '') AS file_evidence
      FROM system_info si;
  - name: "Specific kernel driver service creation validation"
    description: "Validate a named kernel driver service created with sc.exe and check the expected driver file path."
    parameters:
      service_name: "<service_name>"
      driver_path: "<driver_path>"
    sql: |
      WITH svc AS (
        SELECT
          name,
          display_name,
          service_type,
          status,
          pid,
          start_type,
          path,
          module_path,
          user_account,
          win32_exit_code,
          service_exit_code
        FROM services
        WHERE lower(name) = lower('<service_name>')
      ),
      svc_reg AS (
        SELECT
          path,
          name,
          type,
          data,
          datetime(mtime, 'unixepoch', 'UTC') AS modified_utc
        FROM registry
        WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\<service_name>'
      ),
      driver_file AS (
        SELECT
          path,
          size,
          type,
          datetime(btime, 'unixepoch', 'UTC') AS created_utc,
          datetime(mtime, 'unixepoch', 'UTC') AS modified_utc
        FROM file
        WHERE path = '<driver_path>'
      )
      SELECT
        si.hostname AS host,
        CASE
          WHEN EXISTS (SELECT 1 FROM svc) OR EXISTS (SELECT 1 FROM svc_reg) THEN 'true'
          ELSE 'false'
        END AS service_created,
        CASE WHEN EXISTS (SELECT 1 FROM svc) THEN 'true' ELSE 'false' END AS services_table_found,
        CASE WHEN EXISTS (SELECT 1 FROM svc_reg) THEN 'true' ELSE 'false' END AS registry_key_found,
        CASE WHEN EXISTS (SELECT 1 FROM driver_file) THEN 'true' ELSE 'false' END AS driver_file_found,
        COALESCE((SELECT group_concat(name, '; ') FROM svc), '') AS service_name,
        COALESCE((SELECT group_concat(service_type, '; ') FROM svc), '') AS service_type,
        COALESCE((SELECT group_concat(start_type, '; ') FROM svc), '') AS start_type,
        COALESCE((SELECT group_concat(status, '; ') FROM svc), '') AS status,
        COALESCE((SELECT group_concat(CAST(pid AS TEXT), '; ') FROM svc), '') AS pid,
        COALESCE((SELECT group_concat(path, '; ') FROM svc), '') AS service_path,
        COALESCE((SELECT group_concat(name || '=' || data, '; ') FROM svc_reg WHERE name IN ('ImagePath', 'Type', 'Start', 'ErrorControl')), '') AS registry_values,
        COALESCE((SELECT group_concat(path || ' size=' || CAST(size AS TEXT) || ' type=' || type, '; ') FROM driver_file), '') AS driver_file_evidence,
        COALESCE((SELECT group_concat(modified_utc, '; ') FROM svc_reg), '') AS registry_modified_utc
      FROM system_info si;
validation:
  status: "tested"
  tested_date: "2026-06-30"
  notes:
    - "The pattern was tested as a scheduled multi-host query using explicit host selectors. Endpoint result rows, hostnames, node IDs, and Job IDs are intentionally not stored."
    - "The query can show service_created=true even when status is STOPPED. Creation and successful start/load are separate questions."
    - "For sc.exe create type= kernel start= system, expected service evidence is service_type KERNEL_DRIVER and start_type SYSTEM_START."
    - "The loaded-driver-by-path pattern was tested as a scheduled exact-host query on 2026-07-01. Endpoint rows, hostnames, node IDs, and Job IDs are intentionally not stored."
lessons:
  - "Use services for current SCM service state and registry for direct SCM key evidence."
  - "Use exact CurrentControlSet service registry key constraints; avoid broad registry scans when the service name is known."
  - "Use exact driver file path constraints; service creation can succeed even if the driver file is absent."
  - "Driver services commonly report pid 0."
  - "A driver file and service ImagePath can exist while driver_loaded remains false. Treat drivers-table evidence or a RUNNING driver service as stronger loaded-state evidence than registry/file presence."
privacy:
  stores_endpoint_results: false
  notes:
    - "This record stores reusable method knowledge only. It intentionally omits hostnames, node IDs, Job IDs, and endpoint result rows."
