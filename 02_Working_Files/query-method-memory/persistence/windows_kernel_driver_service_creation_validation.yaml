title: "Validate Windows kernel driver service creation"
status: "tested"
created: "2026-06-30"
updated: "2026-06-30"
category: "persistence"
platforms:
  - "windows"
investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Check whether a kernel driver service was created with sc.exe create."
    - "Validate whether a suspicious Windows service exists after sc.exe create type= kernel."
    - "Query selected hosts for a driver service name and its ImagePath."
  keywords:
    - "sc.exe create"
    - "kernel driver"
    - "KERNEL_DRIVER"
    - "SYSTEM_START"
    - "Windows service"
    - "CurrentControlSet Services"
query_goal:
  question: "Determine whether a named Windows kernel driver service creation succeeded and whether the referenced driver file exists."
  answers:
    - "Whether the service exists in the osquery services table."
    - "Whether the SCM registry key exists under HKLM\\SYSTEM\\CurrentControlSet\\Services."
    - "Whether the service type/start type/path match the intended kernel driver service creation."
    - "Whether the referenced driver file exists at the expected path."
    - "Whether a driver appears currently loaded when using the drivers table or a running driver service state."
  does_not_answer:
    - "Who created the service unless Windows event log auditing is also queried."
    - "Whether the driver was successfully loaded unless service status/event logs/runtime driver evidence are also checked."
    - "Whether the driver is malicious."
use_when:
  - "An analyst has a service name from sc.exe create and needs current endpoint state."
  - "The expected service is a kernel driver service, for example type= kernel and start= system."
  - "The analyst wants a low-impact current-state check before moving to event logs or file hashing."
do_not_use_when:
  - "The service name is unknown; use broader service hunting or event log queries first."
  - "The analyst needs historical creation time or creator attribution; query Windows event logs 7045/4697 and process creation logs."
  - "The analyst needs file reputation or content analysis; add hash/authenticode/file metadata."
  preferred_next_queries:
    - "Windows Services Event Logs Monitoring for event IDs 7045 and 4697."
    - "Process creation event logs for sc.exe command line if Security 4688 or Sysmon/EDR telemetry is available."
    - "Hash and authenticode checks for the driver path."
    - "Drivers table lookup if the driver is expected to be currently loaded."
