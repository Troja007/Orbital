osquery_context:
  tables:
    - name: "process_open_sockets"
      columns:
        - "pid"
        - "protocol"
        - "local_address"
        - "local_port"
        - "remote_address"
        - "remote_port"
        - "state"
      platform_notes:
        - "Current-state only; sockets may be absent between connector communication cycles."
    - name: "processes"
      columns:
        - "pid"
        - "name"
        - "path"
        - "cmdline"
      platform_notes:
        - "Join to socket rows for process identity."
    - name: "dns_cache"
      columns:
        - "name"
        - "type"
        - "flags"
      platform_notes:
        - "Windows availability depends on osquery build and permissions."
    - name: "etc_hosts"
      columns:
        - "address"
        - "hostnames"
      platform_notes:
        - "Cross-platform concept; use to detect local hostname overrides."
    - name: "windows_firewall_rules"
      columns:
        - "name"
        - "app_name"
        - "action"
        - "enabled"
        - "direction"
        - "protocol"
        - "local_ports"
        - "remote_ports"
        - "remote_addresses"
      platform_notes:
        - "Native Windows Firewall rule inventory only."
    - name: "registry"
      columns:
        - "key"
        - "path"
        - "name"
        - "data"
      platform_notes:
        - "Use for proxy settings such as Internet Settings keys."
  joins:
    - "LEFT JOIN processes p ON p.pid = pos.pid for socket process enrichment."
    - "CROSS JOIN system_info si when endpoint identity is needed."
  constraints:
    - "Use Windows-only targeting unless adapting platform-specific tables."
    - "Use exact host targeting for triage."
    - "Limit broad socket and firewall-rule queries."
    - "Do not treat absence of current sockets as definitive network failure."

orbital_guidance:
  preferred_query_type: "scheduled_query"
  schedule:
    expiry_minutes: 2
    interval_seconds: 0
  allow_os:
    - "windows"
  target_selector_guidance:
    - "Use host:<hostname> for troubleshooting a specific endpoint."
    - "Use os:windows only after the target scope is explicitly approved."
  broad_targeting_risk:
    level: "medium"
    notes:
      - "Socket and firewall-rule data can be noisy across many endpoints."
      - "DNS cache and registry queries are usually lower impact but can still produce environment-specific data."

sql_patterns:
  - name: "Current Cisco AMP/Secure Endpoint sockets"
    description: "Shows current outbound sockets by Cisco-related processes or to common required ports. Reverse DNS is not guaranteed; use with DNS cache and firewall/proxy logs."
    sql: |
      SELECT
        si.hostname AS host,
        pos.pid,
        p.name AS process_name,
        p.path AS process_path,
        pos.protocol,
        pos.local_address,
        pos.local_port,
        pos.remote_address,
        pos.remote_port,
        pos.state
      FROM process_open_sockets pos
      LEFT JOIN processes p ON p.pid = pos.pid
      CROSS JOIN system_info si
      WHERE pos.remote_port IN (80, 443, 22)
        AND (
          lower(p.path) LIKE '%\cisco\amp\%'
          OR lower(p.path) LIKE '%\cisco secure endpoint\%'
          OR lower(p.path) LIKE '%\cisco\orbital\%'
          OR lower(p.name) IN ('sfc.exe', 'cscm.exe', 'orbital.exe', 'osqueryd.exe')
        )
      ORDER BY si.hostname, pos.remote_port, p.name, pos.remote_address;
  - name: "DNS cache entries for Cisco cloud service domains"
    description: "Looks for recent endpoint DNS cache context for Cisco AMP/Secure Endpoint and Orbital domains."
    sql: |
      SELECT
        name,
        type,
        flags
      FROM dns_cache
      WHERE lower(name) LIKE '%.amp.cisco.com'
        OR lower(name) LIKE '%.eu.amp.cisco.com'
        OR lower(name) LIKE '%.apjc.amp.cisco.com'
        OR lower(name) IN (
          'commercial.ocsp.identrust.com',
          'validation.identrust.com',
          'nimbus.bitdefender.net'
        )
      ORDER BY name;
  - name: "Hosts-file overrides for Cisco cloud service domains"
    description: "Finds local hosts-file entries that could override Cisco cloud hostname resolution."
    sql: |
      SELECT
        address,
        hostnames
      FROM etc_hosts
      WHERE lower(hostnames) LIKE '%amp.cisco.com%'
        OR lower(hostnames) LIKE '%identrust.com%'
        OR lower(hostnames) LIKE '%bitdefender.net%'
      ORDER BY hostnames;
  - name: "Local Windows Firewall rules touching Cisco paths or required ports"
    description: "Checks native Windows Firewall rules that may affect Cisco Secure Endpoint, Orbital, or common required ports. This does not prove upstream firewall policy."
    sql: |
      SELECT
        name,
        app_name,
        action,
        enabled,
        direction,
        protocol,
        local_ports,
        remote_ports,
        remote_addresses
      FROM windows_firewall_rules
      WHERE enabled = 1
        AND (
          lower(app_name) LIKE '%\cisco\%'
          OR remote_ports IN ('80', '443', '22')
          OR local_ports IN ('80', '443', '22')
        )
      ORDER BY direction, action, name
      LIMIT 200;
  - name: "Windows proxy configuration context"
    description: "Collects common Windows proxy registry settings that may influence outbound cloud connectivity."
    sql: |
      SELECT
        key,
        name,
        data
      FROM registry
      WHERE key LIKE 'HKEY_USERS\%\Software\Microsoft\Windows\CurrentVersion\Internet Settings\%'
        AND name IN ('ProxyEnable', 'ProxyServer', 'ProxyOverride', 'AutoConfigURL')
      ORDER BY key, name
      LIMIT 200;

