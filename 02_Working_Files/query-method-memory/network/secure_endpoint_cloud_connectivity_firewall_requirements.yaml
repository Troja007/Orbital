title: "Check Cisco Secure Endpoint cloud connectivity and firewall allowlist context"
status: "draft"
created: "2026-06-15"
updated: "2026-06-15"

investigation_inputs:
  source_type: "analyst_lesson"
  examples:
    - "Cisco Secure Endpoint needs properly configured firewall access to connect to the cloud."
    - "Check whether Secure Endpoint can communicate with required Cisco cloud services."
    - "Troubleshoot Secure Endpoint update, policy, event intake, or disposition connectivity."
    - "Validate local endpoint evidence before escalating to network firewall/proxy teams."
  raw_input_handling:
    store_raw_chat: false
    sanitization_required: true
    notes:
      - "Store reusable troubleshooting intent and source reference only, not raw chat history."
  keywords:
    - "Cisco Secure Endpoint"
    - "AMP"
    - "cloud connectivity"
    - "firewall allowlist"
    - "required server addresses"
    - "TLS decryption"
    - "proxy"
    - "DNS"
    - "port 443"
    - "updates"
    - "policy"
    - "event intake"
  threat_context:
    category: "network"
    platforms:
      - "windows"

cisco_product_knowledge:
  source:
    title: "Required Server Addresses for Proper Secure Endpoint and Malware Analytics"
    vendor: "Cisco"
    url: "https://www.cisco.com/c/en/us/support/docs/security/sourcefire-amp-appliances/118121-technote-sourcefire-00.html"
    document_id: "118121"
    source_updated: "2026-03-10"
    checked_on: "2026-06-15"
  facts:
    - "Cisco Secure Endpoint connector product communication requires firewall access from connector/appliance to Cisco servers for updates, lookups, and reports."
    - "Cisco recommends hostname-based firewall rules because IP addresses can change due to round-robin, load balancing, fault tolerance, and uptime architecture."
    - "If hostname-based firewalling is not possible, all IP addresses listed in the Cisco TechNote must be permitted destinations."
    - "Traffic toward Cisco servers must not be subjected to TLS decryption."
    - "Secure Endpoint public-cloud locations include North America, Europe, and APJC/Japan."
    - "Most required Secure Endpoint services use TCP 443; some definition/update services also use TCP 80; support sessions can use TCP 22."
    - "Orbital cloud endpoints are documented separately in the same TechNote and use regional orbital, ncp.orbital, and update.orbital hostnames on TCP 443."
  hostname_patterns:
    north_america:
      - "*.amp.cisco.com"
    europe:
      - "*.eu.amp.cisco.com"
    apjc:
      - "*.apjc.amp.cisco.com"
  important_service_examples:
    - purpose: "Disposition"
      examples:
        - "cloud-ec-asn.amp.cisco.com"
        - "cloud-ec-est.amp.cisco.com"
        - "enrolment.amp.cisco.com"
      ports:
        - "TCP 443"
    - purpose: "Management, events, policy"
      examples:
        - "mgmt.amp.cisco.com"
        - "intake.amp.cisco.com"
        - "policy.amp.cisco.com"
      ports:
        - "TCP 443"
    - purpose: "Connector downloads and updates"
      examples:
        - "upgrades.amp.cisco.com"
      ports:
        - "TCP 80"
        - "TCP 443"
    - purpose: "Definition updates"
      examples:
        - "tetra-defs.amp.cisco.com"
        - "clam-defs.amp.cisco.com"
        - "commercial.ocsp.identrust.com"
        - "validation.identrust.com"
      ports:
        - "TCP 80"
        - "TCP 443"
    - purpose: "Orbital"
      examples:
        - "orbital.amp.cisco.com"
        - "ncp.orbital.amp.cisco.com"
        - "update.orbital.amp.cisco.com"
        - "orbital.eu.amp.cisco.com"
        - "ncp.orbital.eu.amp.cisco.com"
        - "update.orbital.eu.amp.cisco.com"
      ports:
        - "TCP 443"

non_cisco_operational_context:
  facts:
    - "Endpoint osquery data can show local symptoms and current state, but cannot fully prove upstream firewall, proxy, or TLS inspection policy."
    - "Current socket tables are transient; no current Cisco socket does not prove failure."
    - "DNS cache and hosts-file checks can reveal name resolution behavior or overrides, but not complete network reachability."
    - "Native Windows Firewall rules are separate from enterprise perimeter firewall rules and separate from Cisco Secure Endpoint Host Based Firewall events."
    - "TLS inspection failures often need proxy/firewall logs or packet/TLS diagnostics outside osquery."

query_goal:
  question: "What local endpoint evidence helps troubleshoot whether Cisco Secure Endpoint can reach required Cisco cloud services through firewall, DNS, proxy, and local network controls?"
  expected_information:
    - "Secure Endpoint process presence"
    - "current outbound sockets to Cisco AMP/Secure Endpoint domains or required ports"
    - "DNS cache entries for Cisco AMP/Secure Endpoint domains"
    - "hosts-file overrides for Cisco domains"
    - "local Windows Firewall profile and enabled rule context"
    - "proxy-related registry context"
  answers:
    - "Shows local evidence relevant to Secure Endpoint cloud connectivity troubleshooting."
    - "Highlights whether Cisco-related communication is visible on TCP 443 or TCP 80 at query time."
    - "Finds local DNS cache or hosts-file context for Cisco cloud hostnames."
    - "Separates endpoint-observable facts from upstream firewall/proxy requirements."
  use_when:
    - "Secure Endpoint appears installed but updates, policy, disposition, or event submission may not work."
    - "A network team needs endpoint-side evidence before reviewing firewall/proxy allowlists."
    - "An analyst asks whether Secure Endpoint cloud communication is blocked or misconfigured."
    - "Troubleshooting Orbital connectivity that may rely on related Cisco cloud endpoint allowlists."
  do_not_use_when:
    - "The goal is to enumerate Cisco's complete authoritative allowlist; use the Cisco TechNote directly."
    - "The goal is to prove enterprise firewall policy; use firewall/proxy management-plane evidence."
    - "The endpoint is not Windows; adapt tables first for macOS/Linux."
  does_not_answer:
    - "Whether the upstream firewall or proxy is correctly configured."
    - "Whether TLS decryption is happening in the network path."
    - "Whether every required Cisco hostname or IP is allowed."
    - "Whether Cisco cloud service status is healthy."
  not_for:
    - "Compliance attestation of network allowlists."
    - "Replacing the official Cisco required-server-address document."
  preferred_next_queries:
    - "Verify Cisco Secure Endpoint presence before network troubleshooting."
    - "Check Secure Endpoint Host Based Firewall event history if local product firewall policy may be involved."
    - "Use process_open_sockets joined to processes for current network connections."
    - "Escalate to firewall/proxy logs for definitive allow/deny and TLS inspection evidence."

