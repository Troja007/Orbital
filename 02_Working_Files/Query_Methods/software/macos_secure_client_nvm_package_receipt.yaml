query_goal:
  question: "Determine whether Cisco Secure Client Network Visibility Module appears installed on macOS by package receipt."
  expected_information:
    - "module label"
    - "installation status"
    - "package identifier"
    - "installed package version"
  answers:
    - "Whether a macOS endpoint has a Cisco package receipt that matches NVM or Network Visibility."
    - "Which matching package identifier and version should be used as installation evidence."
  use_when:
    - "An analyst needs a lightweight macOS installation check for the Secure Client NVM module."
    - "A macOS endpoint inventory question can be answered from package receipts."
    - "No macOS endpoint is currently available for live validation, but the method should be available for future use."
  do_not_use_when:
    - "The analyst needs to prove the NVM service is currently running or healthy."
    - "The package was installed without a standard macOS receipt or the receipt database is incomplete."
    - "The target platform is Windows or Linux."
  does_not_answer:
    - "Whether NVM is actively collecting telemetry."
    - "Whether Secure Client is connected or policy-compliant."
    - "Whether the NVM process or service is running."
  not_for:
    - "Runtime health checks without process, launch daemon, service, or log follow-up."
  preferred_next_queries:
    - "Use macOS process or launch daemon checks to confirm runtime state."
    - "Use file or app bundle inventory if package receipts are missing or ambiguous."
    - "Use Cisco Secure Client process/path inventory methods for current process context."

