  examples:
    - "Check whether the Cisco Secure Client NVM module is installed on macOS endpoints."
    - "Query macOS package receipts for Cisco Network Visibility Module."
    - "Find macOS Secure Client Network Visibility Module package version."
  raw_input_handling:
    store_raw_chat: false
    sanitization_required: true
