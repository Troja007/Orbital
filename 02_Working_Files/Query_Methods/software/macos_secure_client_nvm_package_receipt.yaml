  preferred_query_type: "live_query"
  allow_os:
    - "darwin"
  target_selector_guidance:
    - "Use explicit macOS endpoint selectors for validation when a macOS endpoint is available."
    - "For broad macOS checks, use an OS selector or allowOS/darwin filter and confirm scope first."
    - "Do not run this against Windows or Linux targets."
  broad_targeting_risk:
    level: "low"
    notes:
      - "The query reads macOS package receipt metadata with restrictive package_id filters and LIMIT 1."
      - "No live execution was performed during this update because no macOS endpoint was available."

sql_patterns:
  - name: "macOS Cisco Secure Client NVM package receipt"
    description: "Return the newest Cisco package receipt that indicates NVM or Network Visibility Module installation."
    sql: |
      SELECT
        'Cisco Network Visibility Module' AS module,
        'Installed' AS status,
        package_id,
        version
      FROM package_receipts
      WHERE LOWER(package_id) LIKE '%cisco%'
        AND (
          LOWER(package_id) LIKE '%nvm%'
          OR LOWER(package_id) LIKE '%network%visibility%'
        )
      ORDER BY install_time DESC
      LIMIT 1;

