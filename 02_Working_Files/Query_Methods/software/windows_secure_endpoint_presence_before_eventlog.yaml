title: "Verify Cisco Secure Endpoint presence before querying Secure Endpoint event logs"
status: "draft"
created: "2026-06-12"
updated: "2026-06-12"

investigation_inputs:
  source_type: "analyst_lesson"
  examples:
    - "Before querying CiscoSecureEndpoint/Events, check whether Cisco Secure Endpoint is installed and running."
    - "If Secure Endpoint firewall event logs return zero rows, verify product presence first."
    - "Check for sfc.exe, expected Secure Endpoint files, installed applications, services, and registry paths."
    - "Use the Installed Programs Search catalog query to find Cisco Secure Client, Cisco Secure Endpoint, Cisco AMP Orbital, and related Cisco modules."
    - "When querying a named host, use a scheduled host query with a 2-minute expiry so the API returns a Job ID for follow-up."
    - "Query installed Windows services where the service name or display name contains Cisco to identify Secure Client, Secure Endpoint, Orbital, driver, and module service state."
    - "Investigate a specific Windows host for Cisco Secure Client and Cisco Secure Endpoint by combining installed programs, installer registry entries, services, and running processes."
    - "Query a specific Windows host for installed Cisco Secure Client modules."
    - "Check whether TDNR-important Secure Client modules are installed and active on a Windows host."
  keywords:
    - "Cisco Secure Endpoint"
    - "Cisco Secure Client"
    - "Secure Endpoint installed"
    - "Secure Client installed"
    - "Secure Client modules"
    - "TDNR"
    - "sfc.exe"
    - "CiscoSecureEndpoint/Events"
    - "Host Based Firewall"
    - "programs"
    - "services"
    - "service name"
    - "display name"
    - "start type"
    - "registry"
    - "Microsoft Installer"
    - "Windows Installer"
    - "uninstall key"
    - "file"
  threat_context:
    category: "software"
    platforms:
      - "windows"

query_goal:
  question: "Is Cisco Secure Endpoint present and plausibly active on a Windows endpoint before relying on CiscoSecureEndpoint/Events event log queries?"
  expected_information:
    - "running Secure Endpoint connector process evidence"
    - "expected Secure Endpoint files on disk"
    - "installed application inventory"
    - "service inventory"
    - "registry install/uninstall evidence"
    - "Secure Client module inventory"
    - "Orbital module inventory"
  answers:
    - "Whether the endpoint currently has a running sfc.exe process."
    - "Whether common Cisco Secure Endpoint installation paths exist."
    - "Whether Windows installed applications list Cisco Secure Endpoint, Cisco Secure Client, Cisco AMP, AMP for Endpoints, Orbital, or Secure Client modules."
    - "Whether services and registry keys suggest Secure Endpoint is installed."
    - "Whether Cisco Secure Client modules such as VPN, NVM, EVM, DART, or Cloud Management appear in installed programs."
    - "Whether Cisco-related Windows services and drivers are installed, running, stopped, boot-started, system-started, demand-started, or auto-started."
    - "Which Cisco Secure Client / Secure Endpoint-related processes are currently running."
    - "Whether the TDNR-relevant module set is installed and active: Secure Endpoint/EDR, Orbital, EVM, NVM, and XDR Forensics."
  does_not_answer:
    - "Whether the endpoint generated historical firewall events."
    - "Whether Host Based Firewall is enabled by policy."
    - "Whether Secure Endpoint is healthy in the cloud console."
    - "Whether an endpoint that did not answer the live query has Secure Endpoint installed."
  use_when:
    - "A Secure Endpoint event log query against channel CiscoSecureEndpoint/Events returns zero rows."
    - "Investigating Host Based Firewall allow/block events where EDR/Secure Endpoint might not be installed."
    - "Building endpoint context before running product-specific event log queries."
    - "Checking deployment coverage across Windows endpoints."
    - "Checking whether Cisco Secure Client or Secure Endpoint components are installed before investigating product-specific behavior."
    - "Checking current service state for Cisco Secure Client, Cisco Secure Endpoint, Cisco AMP, Orbital, and Cisco driver services."
  do_not_use_when:
    - "The question is only whether standard Windows Firewall is enabled; use firewall profile registry or windows_firewall_rules methods."
    - "The question requires exact cloud policy state; use Secure Endpoint/XDR console or API sources."
    - "The endpoint is non-Windows."
  preferred_next_queries:
    - "CiscoSecureEndpoint/Events Windows event log query for event IDs 1800 and 1801 only after product presence is established."
    - "Cisco Secure Endpoint service status inventory."
    - "Cisco Secure Client / Secure Endpoint service inventory filtered by Cisco service name or display name."
    - "Cisco Secure Client / Secure Endpoint installed programs search using the catalog Installed Programs Search row shape."
    - "Secure Client installed module inventory using programs.name, programs.version, install location, install source, install date, and uninstall string."
    - "TDNR module status using programs, services, and processes evidence."
    - "Cisco Secure Client / Secure Endpoint combined inventory using programs, registry, services, and processes."
    - "Cisco process hash/authenticode verification if binary tampering is suspected."

