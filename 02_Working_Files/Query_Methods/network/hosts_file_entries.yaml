osquery_context:
  tables:
    - name: "etc_hosts"
      columns:
        - "address"
        - "hostnames"
      platform_notes:
        - "Line-parsed hosts-file table."
        - "Cross-platform in the stock catalog for Windows, Linux, and macOS."
    - name: "system_info"
      columns:
        - "hostname"
      platform_notes:
        - "Used to identify the endpoint in cross-endpoint output."
  joins: []
  constraints:
    - "Exclude common default hostnames such as localhost and IPv6 multicast defaults to reduce noise."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os:
    - "windows"
    - "linux"
    - "darwin"
  target_selector_guidance:
    - "Use explicit endpoint selectors for triage, or all only after broad-scope approval."
    - "No OS filter is required when checking all endpoint platforms."
  broad_targeting_risk:
    level: "low"
    notes:
      - "The query reads parsed hosts-file entries and filters defaults; expected endpoint impact is low."

sql_patterns:
  - name: "Non-default hosts file entries"
    description: "List non-default hosts-file entries with endpoint hostname."
    sql: |
      SELECT
        (SELECT hostname FROM system_info LIMIT 1) AS computer_name,
        address,
        hostnames
      FROM etc_hosts
      WHERE hostnames NOT IN ('localhost', '::1', 'fe00::0', 'ff00::0', 'ff02::1', 'ff02::2')
      ORDER BY computer_name ASC, address ASC, hostnames ASC;

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: true
  notes:
    - "Live query against all endpoints completed on 2026-06-10."
    - "Method record intentionally does not store returned hosts-file rows."

lessons:
