query_goal:
  question: "Find non-default hosts-file mappings on endpoints that respond to Orbital."
  expected_information:
    - "computer name"
    - "mapped address"
    - "mapped hostnames"
  not_for:
    - "Proving whether a hosts-file entry is malicious without review of the mapped domain/IP."
    - "Finding endpoints that were offline or did not respond to the live query."

