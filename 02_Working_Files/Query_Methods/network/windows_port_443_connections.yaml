osquery_context:
  tables:
    - name: "process_open_sockets"
      columns:
        - "pid"
        - "protocol"
        - "local_address"
        - "local_port"
        - "remote_address"
        - "remote_port"
        - "state"
      platform_notes:
        - "Available in upstream osquery 5.23.0 schema for open process-owned sockets."
        - "Socket state is useful for separating ESTABLISHED connections from TIME_WAIT, CLOSE_WAIT, SYN_SENT, or listeners."
    - name: "processes"
      columns:
        - "pid"
        - "name"
        - "path"
        - "cmdline"
      platform_notes:
        - "Join on pid to identify the process owning each socket."
    - name: "system_info"
      columns:
        - "hostname"
      platform_notes:
        - "Used to identify the endpoint in cross-endpoint output."
  joins:
    - "LEFT JOIN processes p ON p.pid = pos.pid"
    - "CROSS JOIN system_info si"
  constraints:
    - "Use pos.local_port = 443 OR pos.remote_port = 443 when the request says port 443 without specifying direction."
    - "Use pos.remote_port = 443 for outbound HTTPS-style client connections."
    - "Use pos.local_port = 443 when investigating local services listening or accepting on HTTPS."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os:
    - "windows"
  target_selector_guidance:
    - "Use target selector os:windows when the analyst explicitly asks for all Windows hosts."
    - "Use exact host, hostname, orb, or machine selectors for narrower triage."
    - "Avoid the special all selector for Windows-only analysis unless scope and OS filter behavior are explicitly approved."
  broad_targeting_risk:
    level: "medium"
    notes:
      - "Current socket data is volatile and can return many rows on busy endpoints."
      - "Only endpoints online and responsive during the live-query window return results."

sql_patterns:
  - name: "Windows port 443 sockets with process context"
    description: "Return current open sockets where either local or remote port is 443."
    sql: |
      SELECT
        si.hostname AS host,
        pos.pid,
        p.name AS process_name,
        p.path AS process_path,
        pos.protocol,
        pos.local_address,
        pos.local_port,
        pos.remote_address,
        pos.remote_port,
        pos.state,
        CASE
          WHEN pos.remote_port = 443 THEN 'remote_port_443'
          WHEN pos.local_port = 443 THEN 'local_port_443'
          ELSE 'port_443'
        END AS port_match
      FROM process_open_sockets pos
      LEFT JOIN processes p ON p.pid = pos.pid
      CROSS JOIN system_info si
      WHERE pos.local_port = 443 OR pos.remote_port = 443
      ORDER BY si.hostname, pos.state, p.name, pos.remote_address, pos.remote_port;
  - name: "Windows remote port 443 established connections"
    description: "Return only established outbound-style connections to remote port 443."
    sql: |
      SELECT
        si.hostname AS host,
        pos.pid,
        p.name AS process_name,
        p.path AS process_path,
        pos.local_address,
        pos.local_port,
        pos.remote_address,
        pos.remote_port,
        pos.state
      FROM process_open_sockets pos
      LEFT JOIN processes p ON p.pid = pos.pid
      CROSS JOIN system_info si
      WHERE pos.remote_port = 443
        AND pos.state = 'ESTABLISHED'
      ORDER BY si.hostname, p.name, pos.remote_address;
  - name: "Windows port 443 socket summary by host state and process"
    description: "Compact grouped view for broad target runs."
    sql: |
      SELECT
        si.hostname AS host,
        pos.state,
        CASE
          WHEN pos.remote_port = 443 THEN 'remote_port_443'
          WHEN pos.local_port = 443 THEN 'local_port_443'
          ELSE 'port_443'
        END AS port_match,
        p.name AS process_name,
        count(*) AS connections
      FROM process_open_sockets pos
      LEFT JOIN processes p ON p.pid = pos.pid
      CROSS JOIN system_info si
      WHERE pos.local_port = 443 OR pos.remote_port = 443
      GROUP BY si.hostname, pos.state, port_match, p.name
      ORDER BY si.hostname, pos.state, connections DESC, p.name;

