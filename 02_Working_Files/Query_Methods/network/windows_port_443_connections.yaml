title: "Query Windows port 443 network connections"
status: "tested"
created: "2026-06-10"
updated: "2026-06-10"

investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Show active network connections on port 443 from all Windows hosts."
    - "List Windows processes with open HTTPS connections."
    - "Find current Windows sockets where the local or remote port is 443."
  keywords:
    - "port 443"
    - "https"
    - "network connections"
    - "open sockets"
    - "process_open_sockets"
    - "remote port"
    - "local port"
  threat_context:
    category: "network"
    platforms:
      - "windows"

query_goal:
  question: "List current Windows open sockets involving TCP/HTTPS port 443 with process context."
  expected_information:
    - "endpoint hostname"
    - "process id"
    - "process name"
    - "process path"
    - "local address and port"
    - "remote address and port"
    - "socket state"
  answers:
    - "Which responding Windows endpoints currently have sockets involving port 443?"
    - "Which processes own those port 443 sockets?"
    - "Whether the port 443 match is on the remote side or local side."
    - "Which socket states are present, such as ESTABLISHED, CLOSE_WAIT, SYN_SENT, or TIME_WAIT."
  use_when:
    - "An analyst asks for current active network connections on HTTPS/443 from Windows hosts."
    - "A current-state triage needs process-to-connection mapping for port 443."
    - "A broad Windows live query is acceptable and the analyst expects volatile results."
  do_not_use_when:
    - "The analyst needs historical connections, DNS names, TLS SNI, URLs, or byte counts."
    - "The target platform is not Windows unless the OS selector and wording are adjusted."
    - "The goal is only listening services; use listening_ports when local listeners are the focus."
  does_not_answer:
    - "Which domain name was contacted."
    - "When the connection was created."
    - "Whether the connection content is benign or malicious."
    - "Connections from endpoints that did not respond to the live query window."
  not_for:
    - "Historical network forensics without evented telemetry."
    - "Proxy, TLS, or URL-level attribution."
  preferred_next_queries:
    - "Use DNS cache or dns_lookup_events query methods to correlate remote IPs to recent name-resolution activity when available."
    - "Use process inventory with hashes to enrich suspicious process names or paths."
    - "Use listening_ports for local services bound to port 443."

