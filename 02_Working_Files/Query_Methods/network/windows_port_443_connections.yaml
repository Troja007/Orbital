  live_query_tested: true
  notes:
    - "Validated against upstream osquery 5.23.0 schema for process_open_sockets, processes, and system_info columns."
    - "Matched stock catalog queries Process Socket Search and Processes With Network Connections."
    - "Live query against Windows OS selector completed on 2026-06-10."
    - "Method record intentionally does not store returned connection rows, endpoint names, node IDs, IP addresses, row counts, or raw API responses."

lessons:
  - date: "2026-06-10"
    note: "For broad Windows port 443 connection checks, include system_info.hostname in the SQL so each row is directly attributable to an endpoint."
  - date: "2026-06-10"
    note: "When the analyst says 'on port 443' without direction, return a port_match field to distinguish remote_port_443 from local_port_443."
  - date: "2026-06-10"
    note: "Use a grouped summary query for broad Windows target sets to avoid overwhelming the analyst with hundreds of volatile socket rows."
  - date: "2026-06-10"
    note: "Live socket results are volatile; endpoint counts and socket rows can change between consecutive live-query windows."

