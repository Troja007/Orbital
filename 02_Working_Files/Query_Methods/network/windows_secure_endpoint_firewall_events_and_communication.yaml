investigation_inputs:
  source_type: "analyst_lesson"
  examples:
    - "Query the Windows firewall events written by Cisco Secure Endpoint Host Based Firewall."
    - "Show Secure Endpoint Host Based Firewall allow and block events."
    - "Check communication from Secure Endpoint firewall events and correlate PID/application to current sockets."
    - "Investigate event IDs 1800 and 1801 from CiscoSecureEndpoint/Events."
  keywords:
    - "Cisco Secure Endpoint"
    - "Host Based Firewall"
    - "CiscoSecureEndpoint/Events"
    - "windows_eventlog"
    - "eventid 1800"
    - "eventid 1801"
    - "allow"
    - "block"
    - "communication"
    - "process_open_sockets"
  threat_context:
    category: "network"
    platforms:
      - "windows"

query_goal:
  question: "Which network flows were allowed or blocked by Cisco Secure Endpoint Host Based Firewall, and which process/application was associated with the communication?"
  expected_information:
    - "event timestamp"
    - "firewall timestamp"
    - "event ID"
    - "allow/block action"
    - "direction"
    - "protocol"
    - "local IP and port"
    - "remote IP and port"
    - "PID"
    - "application path"
    - "rule name and GUID"
  answers:
    - "Shows Secure Endpoint Host Based Firewall Windows Event Log rows from channel CiscoSecureEndpoint/Events."
    - "Maps event ID 1800 to Allow and event ID 1801 to Block."
    - "Extracts communication metadata from EventData fields in the event payload."
    - "Provides PID and application path for follow-up process/socket investigation."
  does_not_answer:
    - "Whether Secure Endpoint is installed; run the Secure Endpoint presence method first."
    - "Whether a connection is still active; use process_open_sockets for current-state sockets."
    - "Whether the rule was effective for endpoints that did not answer the query."
    - "Whether policy should allow or block the traffic; review Secure Endpoint policy/rule configuration."
  use_when:
    - "Secure Endpoint presence has been confirmed and the analyst needs Host Based Firewall event evidence."
    - "Investigating allowed or blocked communication on a Windows endpoint protected by Secure Endpoint."
    - "A firewall event, remote IP, remote port, PID, process path, rule name, or direction needs validation from endpoint logs."
  do_not_use_when:
    - "Secure Endpoint/EDR is not installed; CiscoSecureEndpoint/Events may not exist or may contain no relevant rows."
    - "The goal is standard Windows Firewall configuration only; use windows_firewall_rules or firewall profile registry methods."
    - "The goal is active current sockets only; use process_open_sockets joined to processes."
  preferred_next_queries:
    - "Verify Cisco Secure Endpoint presence before querying CiscoSecureEndpoint/Events."
    - "Current process communication check with process_open_sockets joined to processes."
    - "Current running process check for the PID or application path from the event."
    - "Windows firewall rule inventory with windows_firewall_rules when native firewall policy matters."

