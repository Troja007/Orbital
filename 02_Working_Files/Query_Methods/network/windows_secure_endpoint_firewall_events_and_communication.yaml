sql_patterns:
  - name: "Secure Endpoint Host Based Firewall event log summary"
    description: "Extract recent allow/block firewall events from CiscoSecureEndpoint/Events. Event ID 1800 means Allow; 1801 means Block."
    sql: |
      SELECT
        REPLACE(REPLACE(REPLACE(SUBSTR(datetime, 1, 19), 'T', ' '), '.', ''), 'Z', '') AS timestamp_evt,
        datetime(CAST(JSON_EXTRACT(data, '$.EventData.Timestamp') AS INTEGER) / 1000, 'unixepoch', 'localtime') AS timestamp_fw,
        JSON_EXTRACT(json(data), '$.EventData.Protocol') AS protocol,
        JSON_EXTRACT(json(data), '$.EventData.LocalIP') AS sourceIp,
        JSON_EXTRACT(json(data), '$.EventData.LocalPort') AS sourcePort,
        JSON_EXTRACT(json(data), '$.EventData.RemoteIP') AS remoteIp,
        JSON_EXTRACT(json(data), '$.EventData.RemotePort') AS remotePort,
        CASE
          WHEN eventid = 1800 THEN 'Allow'
          WHEN eventid = 1801 THEN 'Block'
          ELSE 'Other'
        END AS action,
        JSON_EXTRACT(json(data), '$.EventData.Direction') AS direction,
        JSON_EXTRACT(json(data), '$.EventData.PID') AS pid,
        JSON_EXTRACT(json(data), '$.EventData.Application Path') AS ApplicationPath,
        JSON_EXTRACT(json(data), '$.EventData.RuleGUID') AS ruleGUID,
        JSON_EXTRACT(json(data), '$.EventData.RuleName') AS ruleName,
        JSON_EXTRACT(json(data), '$.EventData.RuleSetGUID') AS ConfigurationGuid,
        eventid
      FROM windows_eventlog
      WHERE channel = 'CiscoSecureEndpoint/Events'
        AND eventid IN (1800, 1801)
      ORDER BY datetime DESC
      LIMIT 50;
  - name: "Secure Endpoint firewall event query filtered by remote IP and port"
    description: "Use when investigating a known remote IP/port from an alert or IOC."
    sql: |
      SELECT
        datetime,
        eventid,
        CASE
          WHEN eventid = 1800 THEN 'Allow'
          WHEN eventid = 1801 THEN 'Block'
          ELSE 'Other'
        END AS action,
        JSON_EXTRACT(json(data), '$.EventData.Direction') AS direction,
        JSON_EXTRACT(json(data), '$.EventData.Protocol') AS protocol,
        JSON_EXTRACT(json(data), '$.EventData.LocalIP') AS sourceIp,
        JSON_EXTRACT(json(data), '$.EventData.LocalPort') AS sourcePort,
        JSON_EXTRACT(json(data), '$.EventData.RemoteIP') AS remoteIp,
        JSON_EXTRACT(json(data), '$.EventData.RemotePort') AS remotePort,
        JSON_EXTRACT(json(data), '$.EventData.PID') AS pid,
        JSON_EXTRACT(json(data), '$.EventData.Application Path') AS ApplicationPath,
        JSON_EXTRACT(json(data), '$.EventData.RuleName') AS ruleName
      FROM windows_eventlog
      WHERE channel = 'CiscoSecureEndpoint/Events'
        AND eventid IN (1800, 1801)
        AND JSON_EXTRACT(json(data), '$.EventData.RemoteIP') = '<remote_ip>'
        AND JSON_EXTRACT(json(data), '$.EventData.RemotePort') = '<remote_port>'
      ORDER BY datetime DESC
      LIMIT 100;
  - name: "Current communication check for a process or remote endpoint"
    description: "Correlate active sockets with current process context. Use after firewall event rows identify PID, application path, remote IP, or remote port."
    sql: |
      SELECT
        si.hostname AS host,
        pos.pid,
        p.name AS process_name,
        p.path AS process_path,
        pos.protocol,
        pos.local_address,
        pos.local_port,
        pos.remote_address,
        pos.remote_port,
        pos.state
      FROM process_open_sockets pos
      LEFT JOIN processes p ON p.pid = pos.pid
      CROSS JOIN system_info si
      WHERE pos.remote_address != ''
        AND pos.remote_port > 0
        AND (
          pos.pid = <pid>
          OR pos.remote_address = '<remote_ip>'
          OR pos.remote_port = <remote_port>
          OR lower(p.path) = lower('<application_path>')
        )
      ORDER BY si.hostname, pos.pid, pos.remote_address, pos.remote_port;
  - name: "Native Windows Firewall rules check"
    description: "Use separately when the question is about Windows Firewall rule configuration rather than Secure Endpoint event history."
    sql: |
      SELECT
        name,
        app_name,
        action,
        enabled,
        direction,
        protocol,
        local_addresses,
        local_ports,
        remote_addresses,
        remote_ports,
        service_name
      FROM windows_firewall_rules
      WHERE enabled = 1
      ORDER BY direction, action, name;

