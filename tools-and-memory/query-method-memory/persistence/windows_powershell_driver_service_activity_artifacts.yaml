    - "Require explicit service name, driver filename/path, and bounded time window."
    - "For host triage, use scheduled query with explicit host selector and 2-minute expiry."

orbital_guidance:
  preferred_query_type: "scheduled_query"
  allow_os:
    - "windows"
  target_selector_guidance:
    - "Use exact host:<hostname> or explicit endpoint selectors for investigation."
    - "Avoid all/broad targeting unless the user explicitly approves the scope."
  broad_targeting_risk:
    level: "medium"
    notes:
      - "windows_eventlog can be slow or high-volume; keep exact channel/event ID/time/data filters."
      - "file table scans should use exact paths, not broad wildcards."
  execution_order:
    - "PowerShell logs: windows_eventlog PowerShell channels and optionally powershell_events."
    - "Process creation: Security 4688 and Sysmon when available."
    - "Service creation/start/failure: Service Control Manager System events."
    - "Current state: file, services, registry, drivers."
    - "Execution artifacts: Prefetch and UserAssist."

sql_patterns:
  - name: "PowerShell Operational command evidence"
    description: "Find PowerShell event-log command text for service/driver activity."
    sql: |
      SELECT
        datetime,
        channel,
        provider_name,
        eventid,
        level,
        data
      FROM windows_eventlog
      WHERE datetime >= '<start_utc>'
        AND datetime <= '<end_utc>'
        AND channel IN ('Microsoft-Windows-PowerShell/Operational', 'Windows PowerShell')
        AND eventid IN (400, 403, 600, 800, 4103, 4104, 4105, 4106)
        AND (
          lower(data) LIKE '%' || lower('<service_name>') || '%'
          OR lower(data) LIKE '%' || lower('<driver_filename>') || '%'
          OR lower(data) LIKE '%copy-item%'
          OR lower(data) LIKE '%sc.exe%'
          OR lower(data) LIKE '%system32\\drivers%'
        )
      ORDER BY datetime DESC
      LIMIT 100;
  - name: "PowerShell script block table evidence"
    description: "Use when the powershell_events table is available; otherwise use PowerShell windows_eventlog fallback."
    sql: |
      SELECT
        datetime,
        script_name,
        script_path,
        script_block_id,
        script_block_count,
        script_text
      FROM powershell_events
      WHERE datetime >= '<start_utc>'
        AND datetime <= '<end_utc>'
        AND (
          lower(script_text) LIKE '%' || lower('<service_name>') || '%'
          OR lower(script_text) LIKE '%' || lower('<driver_filename>') || '%'
          OR lower(script_text) LIKE '%copy-item%'
          OR lower(script_text) LIKE '%sc.exe%'
          OR lower(script_text) LIKE '%system32\\drivers%'
        )
      ORDER BY datetime DESC
      LIMIT 50;
  - name: "Security 4688 process creation"
    description: "Check process creation if Windows auditing and command line logging are enabled."
    sql: |
      SELECT
        datetime,
        channel,
        provider_name,
        eventid,
        level,
        data
      FROM windows_eventlog
      WHERE datetime >= '<start_utc>'
        AND datetime <= '<end_utc>'
        AND channel = 'Security'
        AND eventid = 4688
        AND (
          lower(data) LIKE '%powershell%'
          OR lower(data) LIKE '%pwsh%'
          OR lower(data) LIKE '%sc.exe%'
          OR lower(data) LIKE '%' || lower('<service_name>') || '%'
          OR lower(data) LIKE '%' || lower('<driver_filename>') || '%'
        )
      ORDER BY datetime DESC
      LIMIT 100;
  - name: "Sysmon process/file/registry/driver evidence"
    description: "Check Sysmon if installed and the channel contains process, file, registry, or driver-load telemetry."
    sql: |
      SELECT
        datetime,
        channel,
        provider_name,
        eventid,
        level,
        data
      FROM windows_eventlog
      WHERE datetime >= '<start_utc>'
        AND datetime <= '<end_utc>'
        AND channel = 'Microsoft-Windows-Sysmon/Operational'
        AND eventid IN (1, 6, 11, 12, 13, 14)
        AND (
          lower(data) LIKE '%powershell%'
          OR lower(data) LIKE '%pwsh%'
          OR lower(data) LIKE '%sc.exe%'
          OR lower(data) LIKE '%' || lower('<service_name>') || '%'
          OR lower(data) LIKE '%' || lower('<driver_filename>') || '%'
        )
      ORDER BY datetime DESC
      LIMIT 100;
  - name: "Service Control Manager service events"
    description: "Confirm service install/start/stop/failure evidence for the named service."
    sql: |
      SELECT
        datetime,
        channel,
        provider_name,
        eventid,
        level,
        data
      FROM windows_eventlog
      WHERE datetime >= '<start_utc>'
        AND datetime <= '<end_utc>'
        AND channel = 'System'
        AND provider_name = 'Service Control Manager'
        AND eventid IN (7000, 7001, 7009, 7011, 7022, 7023, 7024, 7031, 7034, 7035, 7036, 7040, 7045)
        AND (
          lower(data) LIKE '%' || lower('<service_name>') || '%'
          OR lower(data) LIKE '%' || lower('<driver_filename>') || '%'
        )
      ORDER BY datetime DESC
      LIMIT 100;
  - name: "Current file service registry driver state"
    description: "Show current state for the named driver file and service."
    sql: |
      WITH svc AS (
        SELECT name, service_type, status, pid, start_type, path, win32_exit_code
        FROM services
        WHERE lower(name) = lower('<service_name>')
           OR lower(display_name) = lower('<service_name>')
           OR lower(path) LIKE '%' || lower('<driver_filename>') || '%'
      ),
      svc_reg AS (
        SELECT key, name, type, data, datetime(mtime, 'unixepoch', 'UTC') AS modified_utc
        FROM registry
        WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\<service_name>'
      ),
      drv_file AS (
        SELECT path, size, type, datetime(btime, 'unixepoch', 'UTC') AS created_utc, datetime(mtime, 'unixepoch', 'UTC') AS modified_utc
        FROM file
        WHERE path = '<driver_path>'
      ),
      drv AS (
        SELECT service, device_name, image, signed, service_key
        FROM drivers
        WHERE lower(service) = lower('<service_name>')
           OR lower(device_name) LIKE '%' || lower('<service_name>') || '%'
           OR lower(image) LIKE '%' || lower('<driver_filename>') || '%'
      )
      SELECT
        CASE WHEN EXISTS (SELECT 1 FROM drv_file) THEN 'true' ELSE 'false' END AS driver_file_found,
        CASE WHEN EXISTS (SELECT 1 FROM svc) THEN 'true' ELSE 'false' END AS service_found,
        COALESCE((SELECT group_concat(service_type, '; ') FROM svc), '') AS service_type,
        COALESCE((SELECT group_concat(status, '; ') FROM svc), '') AS service_status,
        COALESCE((SELECT group_concat(CAST(pid AS TEXT), '; ') FROM svc), '') AS pid,
        COALESCE((SELECT group_concat(start_type, '; ') FROM svc), '') AS start_type,
        CASE WHEN EXISTS (SELECT 1 FROM svc_reg) THEN 'true' ELSE 'false' END AS registry_key_found,
        CASE WHEN EXISTS (SELECT 1 FROM drv) THEN 'true' ELSE 'false' END AS loaded_driver_found
      FROM system_info;
  - name: "Prefetch execution artifacts"
    description: "Find PowerShell and sc.exe Prefetch execution artifacts."
    sql: |
      SELECT
        filename,
        path,
        last_run_time,
        other_run_times,
        run_count,
        size
      FROM prefetch
      WHERE lower(filename) LIKE 'powershell%.pf'
         OR lower(filename) LIKE 'pwsh%.pf'
         OR lower(filename) LIKE 'sc%.pf'
         OR lower(path) LIKE '%powershell%'
         OR lower(path) LIKE '%\sc.exe%'
      ORDER BY last_run_time DESC
      LIMIT 50;
  - name: "UserAssist execution artifacts"
    description: "Find GUI execution artifacts for PowerShell or sc.exe where present."
    sql: |
      SELECT
        path,
        last_execution_time,
        count,
        sid
      FROM userassist
      WHERE lower(path) LIKE '%powershell%'
         OR lower(path) LIKE '%pwsh%'
         OR lower(path) LIKE '%\sc.exe%'
         OR lower(path) LIKE '%system32\sc%'
      ORDER BY last_execution_time DESC
      LIMIT 50;

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: true
  tested_date: "2026-07-10"
  notes:
    - "The method was tested as bounded scheduled host queries against an explicit Windows host selector. Endpoint result rows, hostnames, node IDs, Job IDs, service names, paths, SIDs, and raw event payloads are intentionally not stored."
    - "In the test, PowerShell Operational Event ID 4104 was the strongest source for exact command text."
    - "The powershell_events table returned an unavailable-table error on the tested endpoint; future use should treat it as optional and fall back to windows_eventlog PowerShell channels."
    - "Security 4688 and Sysmon returned no matching rows in the test; that is a logging/configuration finding, not proof that process execution did not occur."
    - "The current-state query may take longer than the short helper poll window; keep the Job ID and fetch stored results instead of rerunning."

lessons:
  - date: "2026-07-10"
    note: "For PowerShell-created service/driver activity, query PowerShell Operational logs before lower-fidelity artifacts; Event ID 4104 can preserve the exact command text when script block logging is enabled."
  - date: "2026-07-10"
    note: "Use multiple bounded queries rather than one broad event-log sweep: PowerShell logs, process creation/Sysmon, SCM, current state, Prefetch, and UserAssist."
  - date: "2026-07-10"
    note: "A service creation event and current service registration do not prove the driver loaded; check services.status and drivers table separately."
  - date: "2026-07-10"
    note: "Prefetch and UserAssist are supporting execution artifacts. They usually do not provide the full command line and should not override PowerShell or process creation telemetry."

