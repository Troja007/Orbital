    - name: "registry"
      columns:
        - "key"
        - "name"
        - "data"
        - "mtime"
      platform_notes:
        - "Use exact HKLM\\SYSTEM\\CurrentControlSet\\Services\\<service_name> constraints."
    - name: "file"
      columns:
        - "path"
        - "size"
        - "btime"
        - "mtime"
        - "ctime"
      platform_notes:
        - "Use exact driver file path."
    - name: "drivers"
      columns:
        - "service"
        - "device_name"
        - "image"
        - "signed"
        - "service_key"
