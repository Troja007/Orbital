title: "Investigate PowerShell-created Windows driver service artifacts"
status: "tested"
created: "2026-07-10"
updated: "2026-07-10"
category: "persistence"
platforms:
  - "windows"

investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "I executed PowerShell commands that copied a driver file and used sc.exe to create/start a kernel driver service. Query the host for artifacts."
    - "Find evidence of PowerShell activity that created a Windows kernel driver service."
    - "Check a Windows endpoint for PowerShell, service creation, file, registry, loaded-driver, Prefetch, and UserAssist evidence for a named service."
  raw_input_handling:
    store_raw_chat: false
    sanitization_required: true
    notes:
      - "Store commands only as generalized patterns with placeholders for service name, driver path, and source file."
  keywords:
    - "PowerShell"
    - "script block"
    - "sc.exe create"
    - "kernel driver"
    - "Service Control Manager"
    - "Prefetch"
    - "UserAssist"
    - "driver service"
  threat_context:
    category: "persistence"
    platforms:
      - "windows"

query_goal:
  question: "Identify reusable endpoint artifacts showing that PowerShell copied a driver file and created or attempted to start a Windows kernel driver service."
  expected_information:
    - "PowerShell script block or event-log command evidence."
    - "Service Control Manager service installation/start/failure events."
    - "Current driver file, service, SCM registry key, and loaded-driver state."
    - "Execution artifacts for PowerShell and sc.exe from Prefetch and UserAssist."
  answers:
    - "Whether PowerShell logs captured the command text."
    - "Whether Windows logged service creation or start/failure events for the named service."
    - "Whether the driver file exists at the expected path."
    - "Whether the service is registered and what type/status/start mode it has."
    - "Whether the driver appears loaded through the drivers table."
    - "Whether Prefetch/UserAssist contain supporting execution artifacts."
  use_when:
    - "An analyst has a known service name or driver filename from PowerShell/sc.exe activity."
    - "The goal is to reconstruct endpoint artifacts for a Windows service or driver-service persistence attempt."
    - "The investigation should use multiple bounded queries instead of one broad event-log sweep."
  do_not_use_when:
    - "The service name, driver filename, and relevant time window are all unknown; first run broader discovery or ask for scope."
    - "The analyst needs full forensic timeline reconstruction; Orbital artifacts are a triage view, not a disk-image timeline."
    - "The analyst needs proof of maliciousness; these queries show activity and state, not intent or reputation."
  does_not_answer:
    - "Who typed the commands unless process creation, logon, EDR, or shell history evidence includes user attribution."
    - "Whether the driver is malicious without hash, Authenticode, reputation, or content analysis."
    - "Whether PowerShell logging was disabled before the investigation unless logging policy/state is queried separately."
  preferred_next_queries:
    - "Hash and Authenticode checks for the driver file."
    - "Security 4688 or Sysmon process creation for parent/child process and command-line attribution."
    - "Service Control Manager event-log query for install/start/stop/failure events."
    - "Current-state service/registry/file/drivers query for the named driver service."
    - "PowerShell logging policy and script block logging disabled checks."

