sql_patterns:
  - name: "Raw Secure Endpoint Cloud detection events"
    description: "Return bounded raw payloads for recent Secure Endpoint detection events."
    sql: |
      SELECT
        datetime AS event_time,
        channel,
        eventid,
        CASE
          WHEN data LIKE '%EVENT_DETECTION%' THEN 'EVENT_DETECTION'
          ELSE ''
        END AS detection_type,
        substr(data, 1, 1600) AS event_data
      FROM windows_eventlog
      WHERE channel = 'CiscoSecureEndpoint/Cloud'
        AND eventid = 401
        AND data LIKE '%EVENT_DETECTION%'
      ORDER BY datetime DESC
      LIMIT 50;
  - name: "Parsed Secure Endpoint Cloud detection events"
    description: "Extract common detection fields from nested EventData.JsonEvent payloads."
    sql: |
      WITH cloud_events AS (
        SELECT
          datetime AS event_time,
          eventid,
          JSON_EXTRACT(json(data), '$.EventData.JsonEvent') AS json_event
        FROM windows_eventlog
        WHERE channel = 'CiscoSecureEndpoint/Cloud'
          AND eventid = 401
          AND data LIKE '%EVENT_DETECTION%'
      )
      SELECT
        event_time,
        eventid,
        'EVENT_DETECTION' AS detection_type,
        JSON_EXTRACT(json(json_event), '$.dnm') AS detection_name,
        JSON_EXTRACT(json(json_event), '$.fnd') AS file_name,
        JSON_EXTRACT(json(json_event), '$.fpd') AS file_path,
        JSON_EXTRACT(json(json_event), '$.fnp') AS parent_file_name,
        JSON_EXTRACT(json(json_event), '$.pid') AS pid,
        JSON_EXTRACT(json(json_event), '$.dete') AS detection_engine,
        JSON_EXTRACT(json(json_event), '$.sha256d') AS sha256,
        JSON_EXTRACT(json(json_event), '$.md5d') AS md5,
        JSON_EXTRACT(json(json_event), '$.dfc') AS detection_file_context,
        JSON_EXTRACT(json(json_event), '$.dfs') AS disposition
      FROM cloud_events
      ORDER BY event_time DESC
      LIMIT 50;
  - name: "Time-bounded Secure Endpoint Cloud detection events"
    description: "Return raw detection rows written during a specific UTC time window."
    sql: |
      SELECT
        datetime AS event_time,
        channel,
        eventid,
        data
      FROM windows_eventlog
      WHERE channel = 'CiscoSecureEndpoint/Cloud'
        AND eventid = 401
        AND data LIKE '%EVENT_DETECTION%'
        AND datetime >= '<start_time_utc>'
        AND datetime <= '<end_time_utc>'
      ORDER BY datetime DESC;
  - name: "Time-bounded Secure Endpoint Cloud detection summary"
    description: "Count detection events and show first/last detection timestamps for a specific UTC time window."
    sql: |
      SELECT
        COUNT(*) AS detection_event_count,
        MIN(datetime) AS first_detection_time,
        MAX(datetime) AS last_detection_time
      FROM windows_eventlog
      WHERE channel = 'CiscoSecureEndpoint/Cloud'
        AND eventid = 401
        AND data LIKE '%EVENT_DETECTION%'
        AND datetime >= '<start_time_utc>'
        AND datetime <= '<end_time_utc>';

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: true
  notes:
    - "Validated against upstream osquery 5.23.0 schema for windows_eventlog columns."
    - "Validated with scheduled host Orbital queries on 2026-06-15."
    - "The method record does not store endpoint names, file paths, detection names from returned rows, hashes, Job IDs, node IDs, or raw event payloads."

lessons:
  - date: "2026-06-15"
    note: "Secure Endpoint detection telemetry shown in Event Viewer under CiscoSecureEndpoint > Cloud can be queried through windows_eventlog with channel = 'CiscoSecureEndpoint/Cloud', eventid = 401, and data LIKE '%EVENT_DETECTION%'."
  - date: "2026-06-15"
    note: "The useful detection fields are inside EventData.JsonEvent as a nested JSON string; parse with a two-step JSON_EXTRACT pattern."
  - date: "2026-06-15"
    note: "Host Based Firewall logs are separate: channel CiscoSecureEndpoint/Events with event IDs 1800/1801."
  - date: "2026-06-15"
    note: "Compared with the Secure Endpoint Cloud Events API, the local Windows Event Log contains compact detection telemetry but not all cloud enrichment. The matching cloud Threat Detected event can add readable event_type, severity, normalized disposition, computer/group context, API links, external IP, and MITRE tactics/techniques."
  - date: "2026-06-15"
    note: "The Secure Endpoint Cloud Events API can expose a separate Exploit Prevention event adjacent to the Threat Detected event. That cloud-side Exploit Prevention record can include attack details such as attacked module, base address, threat module/submodule, application type, process integrity/user, full command lines, parent-process hashes, and file metadata; these details should not be assumed to exist in the local EVENT_DETECTION Windows Event Log row."
  - date: "2026-06-15"
    note: "For the question 'were there any Secure Endpoint detections during this time period?', query windows_eventlog with channel = 'CiscoSecureEndpoint/Cloud', eventid = 401, data LIKE '%EVENT_DETECTION%', and explicit UTC datetime bounds. A count/first/last summary is usually enough for presence confirmation."

