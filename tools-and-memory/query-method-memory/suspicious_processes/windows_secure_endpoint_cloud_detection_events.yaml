title: "Query Cisco Secure Endpoint Cloud detection events on Windows"
status: "tested"
created: "2026-06-15"
updated: "2026-06-15"

investigation_inputs:
  source_type: "analyst_lesson"
  examples:
    - "Find Cisco Secure Endpoint detection events in the Windows Event Log."
    - "Query Secure Endpoint Cloud EVENT_DETECTION entries from Windows endpoints."
    - "Extract detection name, file path, parent process, PID, and hashes from Secure Endpoint Cloud log events."
    - "Check whether Secure Endpoint wrote any detection events during a specific time period."
    - "Count Secure Endpoint detection events between two timestamps."
  keywords:
    - "Cisco Secure Endpoint"
    - "CiscoSecureEndpoint/Cloud"
    - "EVENT_DETECTION"
    - "eventid 401"
    - "windows_eventlog"
    - "detection"
    - "Talos"
    - "file detection"
    - "time window"
    - "time period"
  threat_context:
    category: "suspicious_processes"
    platforms:
      - "windows"

query_goal:
  question: "Which Cisco Secure Endpoint detection events were written to the Windows Event Log, and what file/process evidence is embedded in the detection payload?"
  expected_information:
    - "event timestamp"
    - "detection event ID"
    - "detection type"
    - "detection name"
    - "detected file name"
    - "detected file path"
    - "parent process name"
    - "PID"
    - "hash fields when present"
    - "disposition/context fields when useful"
    - "compact endpoint-side detection telemetry from the local Windows Event Log"
  answers:
    - "Shows Secure Endpoint Cloud detection telemetry from Windows Event Log channel CiscoSecureEndpoint/Cloud."
    - "Filters on event ID 401 and EVENT_DETECTION payloads."
    - "Extracts fields from the nested EventData.JsonEvent JSON string."
    - "Provides file/process indicators for follow-up with processes, file, hash, or process_open_sockets."
    - "Proves that a Secure Endpoint detection event was written locally on the Windows endpoint."
    - "Answers whether any Secure Endpoint detection events were written within a specific UTC time window."
    - "Can summarize detection presence with count, first detection time, and last detection time for a bounded period."
  does_not_answer:
    - "Host Based Firewall allow/block communication history; use CiscoSecureEndpoint/Events event IDs 1800/1801."
    - "Whether a detected process is still running."
    - "Whether remediation completed successfully unless corresponding remediation/status fields are explicitly parsed and understood."
    - "Cloud console disposition semantics for every numeric field; verify field meaning against Cisco documentation before customer-facing claims."
    - "Cloud API-only enrichment such as normalized event_type text, severity, group context, API links, external IP, MITRE tactics/techniques, and normalized disposition labels."
    - "Detailed Secure Endpoint Cloud Exploit Prevention attack details such as attacked module, base address, threat module/submodule, application type, full process command line, parent full command line, process integrity, and parent process hashes."
  use_when:
    - "A screenshot or Event Viewer view shows CiscoSecureEndpoint > Cloud events with source CiscoSecureEndpoint and Event ID 401."
    - "An analyst generated Secure Endpoint detections and wants to retrieve them through Orbital/osquery."
    - "The investigation needs local endpoint evidence for malware/file/behavioral detections recorded by Secure Endpoint."
    - "The analyst needs a quick local confirmation that detections occurred between two timestamps."
  do_not_use_when:
    - "The goal is Host Based Firewall allow/block events; use the Host Based Firewall method instead."
    - "The endpoint does not have Cisco Secure Endpoint installed or the CiscoSecureEndpoint/Cloud channel is absent."
    - "The analyst needs full raw event payloads for every row; use a raw event query with a larger substr length or raw export workflow."
    - "The analyst needs the full Secure Endpoint Cloud Events API enrichment or the separate cloud-side Exploit Prevention event record."
  preferred_next_queries:
    - "Check whether the detected PID is still running with processes."
    - "Hash the detected file path with the hash table when the file still exists."
    - "Use process_open_sockets for current communication by PID or process path."
    - "Use the Host Based Firewall method when network allow/block context is needed."

