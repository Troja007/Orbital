osquery_context:
  tables:
    - name: "processes"
      columns:
        - "pid"
        - "name"
        - "path"
        - "cmdline"
        - "state"
      platform_notes:
        - "Validate platform behavior and Orbital availability before broad use."
        - "Querying the processes table itself has low performance impact on the endpoint."
    - name: "hash"
      columns:
        - "path"
        - "sha256"
      platform_notes:
        - "Hash calculation can be more expensive than simple process enumeration."
  joins:
    - "processes.path = hash.path"
  constraints:
    - "Consider filtering by process name, path, or target scope before broad execution."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os: []
  target_selector_guidance:
    - "Prefer exact endpoint selectors for active triage."
    - "Use broad selectors only after considering hash calculation cost and target count."
  broad_targeting_risk:
    level: "medium"
    notes:
      - "Joining process inventory to file hashing can add endpoint work on large target sets."

sql_patterns:
  - name: "Catalog pattern"
    description: "Start from the Cisco-managed catalog query when current running process hashes are needed."
    sql: |
      SELECT
        p.pid,
        p.name,
        p.path,
        p.cmdline,
        p.state,
        h.sha256
      FROM processes p
      INNER JOIN hash h
        ON p.path = h.path;

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: false
  notes:
    - "SQL pattern is from the local 1:1 catalog query source and source-map example. Live execution has not been tested by this method record."

lessons:
  - date: "2026-06-10"
    note: "Use this as a method for current-state process hash triage, not as historical process evidence."
  - date: "2026-06-10"
    note: "User update: querying the osquery processes table generates low performance impact on the endpoint. Keep separate performance caution for joins to hash because file hashing adds work beyond process enumeration."

privacy:
  stores_endpoint_results: false
  sanitized_placeholders:
    - "<process_name>"
    - "<path>"
    - "<sha256>"
  forbidden_values:
    - "hostnames"
    - "usernames"
    - "ip_addresses"
    - "orbital_ids"
    - "secure_endpoint_guids"
    - "secure_client_guids"
    - "anyconnect_udids"
    - "customer_names"
    - "bearer_tokens"
    - "raw_api_responses"
