investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "How can I collect SHA256 hashes for currently running processes?"
    - "Find process hashes for suspicious running executables."
  keywords:
    - "sha256"
    - "running processes"
    - "process hash"
    - "processes"
    - "hash"
  threat_context:
    category: "suspicious_process"
    platforms:
      - "cross_platform"

query_goal:
  question: "Identify currently running processes and calculate SHA256 hashes for their executable paths."
  expected_information:
    - "process id"
    - "process name"
    - "process path"
    - "command line"
    - "process state"
    - "SHA256 hash"
  not_for:
    - "Historical process execution after the process has exited."
    - "Fileless activity where no executable path can be hashed."

