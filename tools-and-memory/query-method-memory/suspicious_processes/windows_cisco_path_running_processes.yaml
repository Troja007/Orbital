title: "Find running Cisco-path processes on Windows"
status: "tested"
created: "2026-06-11"
updated: "2026-06-11"

investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Query all Windows endpoints for running processes where the executable path contains Cisco."
    - "Show running processes related to Cisco Secure Endpoint or Cisco Secure Client."
  raw_input_handling:
    store_raw_chat: false
    sanitization_required: true
    notes:
      - "Store the reusable process-path method only; do not store endpoint result rows."
  keywords:
    - "Cisco Secure Endpoint"
    - "Cisco Secure Client"
    - "running processes"
    - "process path"
    - "cisco"
  threat_context:
    category: "software"
    platforms:
      - "windows"

query_goal:
  question: "Which currently running processes have executable paths that include Cisco?"
  expected_information:
    - "host"
    - "process id"
    - "process name"
    - "executable path"
    - "command line"
    - "process state"
    - "process start time"
  answers:
    - "Shows Cisco-related running processes on responding Windows endpoints."
    - "Provides context for Cisco Secure Endpoint, Cisco Secure Client, Orbital, and other Cisco process families installed under Cisco paths."
  use_when:
    - "Building endpoint context around Cisco Secure Endpoint or Cisco Secure Client presence."
    - "Checking whether expected Cisco user-mode or service processes are running."
    - "Preparing a broader health, posture, or product-context investigation."
  do_not_use_when:
    - "The goal is installation inventory rather than running process state; use programs, services, registry, or file inventory methods."
    - "The goal is cryptographic verification; add hash or authenticode joins after scoping."
    - "The goal is historical execution after the process exited."
  does_not_answer:
    - "Whether a Cisco product is fully healthy."
    - "Whether a binary is signed or untampered."
    - "Whether endpoints that did not answer have Cisco processes."
  preferred_next_queries:
    - "Cisco services inventory."
    - "Cisco installed products from registry or programs."
    - "Hash/authenticode verification for Cisco executable paths."
    - "Cisco process network connections."

