osquery_context:
  tables:
    - name: "processes"
      columns:
        - "pid"
        - "name"
        - "path"
        - "cmdline"
        - "state"
        - "start_time"
      platform_notes:
        - "The processes table is current-state only."
        - "Path filtering is low impact compared with broad file or hash collection."
    - name: "system_info"
      columns:
        - "hostname"
        - "uuid"
      platform_notes:
        - "Used to identify the endpoint for each process row."
  joins:
    - "CROSS JOIN system_info si"
  constraints:
    - "Use lower(p.path) LIKE '%cisco%' for case-insensitive matching."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os:
    - "windows"
  target_selector_guidance:
    - "Use nodes [\"os:windows\"] when continuing Windows endpoint context."
    - "For cross-platform Cisco process context, validate path patterns for macOS and Linux separately."
  broad_targeting_risk:
    level: "low"
    notes:
      - "The query is current-state and scoped to processes whose executable path contains Cisco."
      - "The result set can still be large because multiple Cisco components may run per endpoint."

sql_patterns:
  - name: "Cisco-path running process lookup"
    description: "Return Cisco-related running process rows with endpoint identity."
    sql: |
      SELECT
        si.hostname AS host,
        si.uuid AS uuid,
        p.pid,
        p.name AS process_name,
        p.path AS process_path,
        p.cmdline AS command_line,
        p.state,
        datetime(p.start_time, 'unixepoch', 'UTC') AS started_utc
      FROM processes p
      CROSS JOIN system_info si
      WHERE lower(p.path) LIKE '%cisco%'
      ORDER BY si.hostname, p.name, p.pid;

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: true
  notes:
    - "Column names were checked against osquery 5.23.0 schema."
    - "Live-tested against Windows OS targeting on 2026-06-11. Endpoint result rows are intentionally not stored."

