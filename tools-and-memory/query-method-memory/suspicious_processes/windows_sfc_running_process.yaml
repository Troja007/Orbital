title: "Find running or missing sfc.exe processes on Windows"
status: "tested"
created: "2026-06-10"
updated: "2026-06-10"

investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Query running processes from Windows endpoints only for process name sfc.exe. Show PID, process name, path, and command line, ordered by computer name."
    - "Query all Windows endpoints and show endpoints where no sfc.exe process is running."
  keywords:
    - "sfc.exe"
    - "running process"
    - "processes"
    - "windows"
    - "cmdline"
  threat_context:
    category: "suspicious_process"
    platforms:
      - "windows"

query_goal:
  question: "Identify Windows endpoints where sfc.exe is currently running, or invert the check to show endpoints where sfc.exe is not running."
  expected_information:
    - "computer name"
    - "endpoint current-state status"
    - "process id"
    - "process name"
    - "executable path"
    - "command line"
  not_for:
    - "Historical process execution after sfc.exe has exited."
    - "Validating file hash or signature; use a hash/authenticode method for that."
    - "Determining why an endpoint did not answer the live query; use Orbital job/target metadata for response coverage."

