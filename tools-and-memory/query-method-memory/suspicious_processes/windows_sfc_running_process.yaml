osquery_context:
  tables:
    - name: "processes"
      columns:
        - "pid"
        - "name"
        - "path"
        - "cmdline"
      platform_notes:
        - "The processes table is current-state only."
        - "Querying the processes table has low performance impact on the endpoint."
    - name: "system_info"
      columns:
        - "hostname"
      platform_notes:
        - "Used to add computer name for ordering and readable output."
  joins: []
  constraints:
    - "Filter by lower(name) = 'sfc.exe' to avoid returning every running process."
    - "Use NOT EXISTS with system_info when the analyst needs one row for each responding endpoint where sfc.exe is absent."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os:
    - "windows"
  target_selector_guidance:
    - "Use Orbital allowOS/windows or equivalent Windows-only filter."
    - "Prefer explicit endpoint selectors for triage; avoid broad all targeting unless approved."
  broad_targeting_risk:
    level: "low"
    notes:
      - "The query is narrowly filtered by process name and querying the processes table has low endpoint performance impact."
      - "Broad targeting still touches every selected endpoint, so confirm scope before using all."

sql_patterns:
  - name: "sfc.exe running process lookup"
    description: "Find current sfc.exe process rows and include the hostname so results can be ordered by computer name."
    sql: |
      SELECT
        pid,
        name AS processname,
        path,
        cmdline AS command_line,
        (SELECT hostname FROM system_info LIMIT 1) AS computer_name
      FROM processes
      WHERE lower(name) = 'sfc.exe'
      ORDER BY computer_name ASC;
  - name: "sfc.exe not-running endpoint lookup"
    description: "Return one row per responding Windows endpoint where no current sfc.exe process is visible."
    sql: |
      SELECT
        si.hostname AS host,
        si.uuid AS uuid,
        'sfc.exe_not_running' AS status
      FROM system_info si
      WHERE NOT EXISTS (
        SELECT 1
        FROM processes p
        WHERE lower(p.name) = 'sfc.exe'
           OR lower(p.path) LIKE '%\sfc.exe'
      )
      ORDER BY si.hostname;

validation:
  osquery_schema_checked: true
  orbital_catalog_checked: true
  live_query_tested: true
  notes:
    - "Column names were checked against the osquery 5.23.0 schema."
    - "The not-running inverse pattern was live-tested against Windows OS targeting on 2026-06-11. Endpoint result rows are intentionally not stored."

lessons:
