title: "Check Windows Cisco Secure Client EVM EnabledSources registry value"
status: "tested"
created: "2026-06-30"
updated: "2026-06-30"
category: "software"
platforms:
  - "windows"
investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Check whether Cisco Secure Client Endpoint Visibility Module has Kernel Extensions enabled in the registry."
    - "Show true or false if EVM EnabledSources is set to 0x20 or 0xffffffff."
    - "Query selected Windows endpoints for the Secure Client EVM EnabledSources registry DWORD."
    - "Check whether the EVM registry value was set after running reg add for EnabledSources."
  keywords:
    - "Secure Client"
    - "Endpoint Visibility Module"
    - "EVM"
    - "EnabledSources"
    - "registry"
    - "REG_DWORD"
    - "kernel extensions"
query_goal:
  question: "Determine whether the Cisco Secure Client Endpoint Visibility Module registry value EnabledSources exists and whether it enables kernel-extension telemetry or all event classes."
  answers:
    - "Whether the EVM EnabledSources registry value exists."
    - "Whether bit 0x20 is enabled for Kernel Extensions."
    - "Whether all EVM event classes are enabled via 0xffffffff."
    - "The raw REG_DWORD value returned by osquery for troubleshooting representation differences."
  does_not_answer:
    - "Whether EVM is actively transmitting telemetry to the cloud."
    - "Whether the CiscoEVMService process or EVM driver is currently running."
    - "Whether telemetry events are successfully processed by the backend."
use_when:
  - "An analyst needs a low-impact configuration check for Cisco Secure Client Endpoint Visibility Module on Windows."
  - "The desired evidence is the Windows registry setting under HKLM for EVM EnabledSources."
  - "The analyst needs per-endpoint true/false output for 0x20 and 0xffffffff states."
do_not_use_when:
  - "The question is runtime health; use services/processes/drivers for CiscoEVMService, CiscoEVMDriver, and CiscoEVMElam instead."
  - "The question is backend telemetry arrival; use backend/cloud evidence, not local registry state."
  - "The target platform is not Windows."
preferred_next_queries:
  - "Check installed Cisco Secure Client modules with the programs table."
  - "Check EVM runtime service and driver state with services and processes."
  - "If the registry value is absent but EVM is installed, query broader Cisco SecureClient registry context with direct key constraints."
