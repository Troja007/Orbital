  - date: "2026-06-10"
    note: "Do not rerun an in-flight live query only to monitor progress. Wait for the submitted query response or use the returned orbital_queryID with job endpoints if the API returns one."
  - date: "2026-06-10"
    note: "Endpoint response counts can vary across live-query windows because only online and responsive endpoints return results."
  - date: "2026-06-10"
    note: "Broad Windows DNS-cache result rendering can be delayed by slow endpoint responders, high total row volume, or endpoint result-generation timeouts even when early endpoints return quickly."
  - date: "2026-06-10"
