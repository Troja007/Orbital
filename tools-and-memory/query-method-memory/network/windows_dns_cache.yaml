osquery_context:
  tables:
    - name: "dns_cache"
      columns:
        - "name"
        - "type"
        - "flags"
      platform_notes:
        - "Enumerates the Windows DNS cache through dnsapi.dll."
        - "Use Windows OS targeting or allowOS filtering."
    - name: "system_info"
      columns:
        - "hostname"
      platform_notes:
        - "Used to attribute each returned DNS cache row to an endpoint hostname."
  joins:
    - "CROSS JOIN system_info to include endpoint hostname on every DNS cache row."
  constraints:
    - "Prefer selecting explicit columns instead of SELECT *."
    - "Use WHERE dc.name LIKE '<pattern>' or WHERE dc.type = '<record_type>' when narrowing an IOC hunt."

orbital_guidance:
  preferred_query_type: "live_query"
  allow_os:
    - "windows"
  target_selector_guidance:
    - "Use target selector os:windows when the analyst explicitly asks for all Windows machines."
    - "Use exact host, hostname, orb, or machine selectors for narrower triage."
    - "Do not use the special all selector for this Windows-only table unless the scope and OS filter behavior are explicitly approved."
  broad_targeting_risk:
    level: "low"
    notes:
      - "The query reads a small current-state cache table, but broad Windows targeting can still produce many rows."
      - "Live queries only return endpoints that are online and responsive during the query window."

sql_patterns:
  - name: "Host-attributed Windows DNS cache"
    description: "Return current DNS cache entries with endpoint hostname for all responding Windows endpoints."
    sql: |
      SELECT
        si.hostname AS host,
        dc.name AS "domain",
        dc.type
      FROM dns_cache dc
      CROSS JOIN system_info si
      ORDER BY si.hostname, dc.name, dc.type;
  - name: "Filtered Windows DNS cache by domain pattern"
    description: "Use when the analyst provides a domain, suffix, or IOC pattern."
    sql: |
      SELECT
        si.hostname AS host,
        dc.name AS "domain",
        dc.type
      FROM dns_cache dc
      CROSS JOIN system_info si
      WHERE dc.name LIKE '<domain_pattern>'
      ORDER BY si.hostname, dc.name, dc.type;
  - name: "Windows DNS cache count summary"
    description: "Use when a compact per-host summary is preferable to returning every cached name."
    sql: |
      SELECT
        si.hostname AS host,
        dc.type,
        count(*) AS records
      FROM dns_cache dc
      CROSS JOIN system_info si
      GROUP BY si.hostname, dc.type
      ORDER BY si.hostname, dc.type;

