title: "Query Windows endpoint DNS cache"
status: "tested"
created: "2026-06-10"
updated: "2026-06-10"

investigation_inputs:
  source_type: "analyst_question"
  examples:
    - "Query the DNS cache from all Windows machines."
    - "Show cached DNS records from Windows endpoints."
    - "Check Windows DNS cache entries for a specific domain pattern."
  keywords:
    - "dns cache"
    - "dns_cache"
    - "cached dns"
    - "dns records"
    - "dns poisoning"
    - "name resolution"
  threat_context:
    category: "network"
    platforms:
      - "windows"

query_goal:
  question: "Retrieve current DNS cache entries from Windows endpoints that respond to Orbital."
  expected_information:
    - "endpoint hostname"
    - "cached DNS record name"
    - "DNS record type"
  answers:
    - "Which DNS names are currently present in the Windows DNS cache?"
    - "Which responding Windows endpoint reported each cached DNS record?"
    - "Which record types are present for cached DNS names?"
  use_when:
    - "An analyst asks for current DNS cache contents from Windows endpoints."
    - "An investigation needs quick current-state DNS-cache visibility without process attribution."
    - "A domain-pattern hunt can be bounded to Windows DNS cache contents."
  do_not_use_when:
    - "The analyst needs historical DNS lookups, timestamps, process IDs, response values, or usernames."
    - "The endpoint platform is Linux or macOS."
    - "The goal is to prove DNS cache poisoning without validation against resolver logs or expected DNS answers."
  does_not_answer:
    - "Which process made a DNS lookup."
    - "When the lookup happened."
    - "What IP address was returned by the resolver."
    - "Whether an endpoint that did not answer had matching DNS cache entries."
  not_for:
    - "Historical DNS investigation unless paired with evented DNS telemetry."
    - "Full DNS response reconstruction."
  preferred_next_queries:
    - "Use dns_lookup_events for Windows DNS lookup events when process, timestamp, status, or response data is needed and event telemetry is available."
    - "Use process/network socket queries to correlate suspicious domains with currently running processes."
    - "Use hosts-file query methods to check local name-resolution overrides."

